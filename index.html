<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema ROX | عالم الأفلام والأنمي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Cinema <span>ROX</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو أنمي...">
        </div>
    </nav>

    <header class="hero" id="heroSection"></header>

    <main>
        <section class="container">
            <h2 class="section-title">الأفلام الرائجة</h2>
            <div class="grid" id="moviesGrid"></div>
        </section>

        <section class="container">
            <h2 class="section-title">عالم الأنمي (AniList)</h2>
            <div class="grid" id="animeGrid"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
