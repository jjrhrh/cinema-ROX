<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema ROX</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ===== SPLASH SCREEN ===== -->
<div id="splash-screen">
  <div class="splash-logo">
    <img src="logo.png" alt="logo">
  </div>
  <div class="splash-text">Cinema <span>ROX</span></div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>
<!-- ===== END SPLASH ===== -->
<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-links">
    <button class="nav-btn active" data-page="moviesPage" onclick="showPage('moviesPage')">🎬 أفلام</button>
    <button class="nav-btn" data-page="seriesPage" onclick="showPage('seriesPage')">📺 مسلسلات</button>
    <button class="nav-btn" data-page="animePage" onclick="showPage('animePage')">✨ أنمي</button>
    <button class="nav-btn" data-page="searchPage" onclick="showPage('searchPage')">🔍 بحث</button>
  </div>
  <div class="logo" onclick="goHome()">Cinema <span>ROX</span></div>
  <div class="nav-right-btns">
    <button class="menu-btn" onclick="openSideMenu()">☰</button>
  </div>
</nav>

<!-- القائمة الجانبية -->
<div class="side-menu-overlay" id="sideMenuOverlay" onclick="closeSideMenu()"></div>
<div class="side-menu" id="sideMenu">
  <div class="side-menu-header">
    <span class="side-menu-title">القائمة</span>
    <button class="side-menu-close" onclick="closeSideMenu()">✕</button>
  </div>
  <ul class="side-menu-list">
    <li onclick="closeSideMenu();showPage('moviesPage')">🎬 الأفلام</li>
    <li onclick="closeSideMenu();showPage('seriesPage')">📺 المسلسلات</li>
    <li onclick="closeSideMenu();showPage('animePage')">✨ الأنمي</li>
    <li onclick="closeSideMenu();showPage('searchPage')">🔍 البحث</li>
    <li onclick="closeSideMenu();openNetworksPage()">📡 الشبكات والقنوات</li>
    <li onclick="closeSideMenu();openSettings()">⚙️ الإعدادات</li>
  </ul>
</div>

<!-- صفحة الشبكات -->
<div class="page" id="networksListPage"></div>
<!-- HERO BANNER -->
<div id="heroBanner" class="hero-banner">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-badge">🔥 الأكثر مشاهدة</div>
    <h1 class="hero-title" id="heroTitle"></h1>
    <p class="hero-desc" id="heroDesc"></p>
    <div class="hero-meta" id="heroMeta"></div>
    <div class="hero-btns">
      <button class="hero-btn-watch" id="heroWatchBtn">▶ مشاهدة الآن</button>
      <button class="hero-btn-info" id="heroInfoBtn">ℹ️ التفاصيل</button>
    </div>
  </div>
  <div class="hero-dots" id="heroDots"></div>
</div>
<!-- END HERO -->
<!-- صفحة الأفلام -->
<div class="page active" id="moviesPage">
  <div class="container">
    <h2 class="section-title">🔥 الأفلام الرائجة</h2>
    <div class="grid" id="moviesGrid"></div>
  </div>
</div>

<!-- صفحة المسلسلات -->
<div class="page" id="seriesPage">
  <div class="container">
    <h2 class="section-title">📺 المسلسلات الرائجة</h2>
    <div class="grid" id="seriesGrid"></div>
  </div>
</div>

<!-- صفحة الأنمي -->
<div class="page" id="animePage">
  <div class="container">
    <h2 class="section-title">✨ عالم الأنمي</h2>
    <div class="grid" id="animeGrid"></div>
  </div>
</div>

<!-- صفحة البحث -->
<div class="page" id="searchPage">
  <div class="container">
    <h2 class="section-title">🔍 ابحث عن فيلم أو مسلسل</h2>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="اكتب اسم الفيلم أو المسلسل...">
      <button onclick="doSearch()">بحث</button>
    </div>
    <div class="grid" id="searchGrid"></div>
  </div>
</div>

<!-- صفحة التفاصيل -->
<div class="page" id="detailPage"></div>

<!-- صفحة المنصة -->
<div class="page" id="networkPage"></div>

<!-- مشغل الفيديو -->
<div class="modal" id="playerModal">
  <div class="modal-inner">
    <button class="close-btn" onclick="closePlayer()">✕</button>
    <button id="nextServerBtn" onclick="nextServer()">🔄 سيرفر 1/4</button>
    <iframe id="playerFrame" src="" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
  </div>
</div>

<!-- نافذة الإعدادات -->
<div class="modal" id="settingsModal">
  <div class="settings-inner">
    <button class="close-btn" onclick="closeSettings()">✕</button>
    <h2 class="settings-title">⚙️ الإعدادات</h2>
    <div class="settings-section">
      <h3>🎨 لون الموقع</h3>
      <div class="color-options">
        <button class="color-opt active" onclick="setColor('#e50914',this)" style="background:#e50914">أحمر</button>
        <button class="color-opt" onclick="setColor('#1a6cff',this)" style="background:#1a6cff">أزرق</button>
        <button class="color-opt" onclick="setColor('#1ce783',this)" style="background:#1ce783;color:#000">أخضر</button>
        <button class="color-opt" onclick="setColor('#f5a623',this)" style="background:#f5a623;color:#000">ذهبي</button>
        <button class="color-opt" onclick="setColor('#c084fc',this)" style="background:#c084fc;color:#000">بنفسجي</button>
        <button class="color-opt" onclick="setColor('#ffffff',this)" style="background:#fff;color:#000">أبيض</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>🌑 خلفية الموقع</h3>
      <div class="color-options">
        <button class="color-opt" onclick="setBg('#0b0c10','#12141c',this)">أسود</button>
        <button class="color-opt" onclick="setBg('#0a0a1a','#10102a',this)">أسود مزرق</button>
        <button class="color-opt" onclick="setBg('#0d0d0d','#1a1a1a',this)">رمادي داكن</button>
        <button class="color-opt" onclick="setBg('#1a0a0a','#2a1010',this)">أسود محمر</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
